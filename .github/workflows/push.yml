name: Dev Build and Release

on:
  push:
    branches-ignore:
      - 'release'

jobs:
  branch_meta:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.extract_branch_meta.outputs.branch }}
      sha: ${{ steps.extract_branch_meta.outputs.sha }}
    steps:
      - name: Extract branch metadata
        shell: bash
        id: extract_branch_meta
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BRANCH_REF_NAME: ${{ github.ref_name}}
          BRANCH_SHA: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" == 'pull_request' ]; then
            echo "branch=$PR_HEAD_REF" >> $GITHUB_OUTPUT
            echo "sha=$PR_HEAD_SHA" >> $GITHUB_OUTPUT
          else
            echo "branch=$BRANCH_REF_NAME" >> $GITHUB_OUTPUT
            echo "sha=$BRANCH_SHA" >> $GITHUB_OUTPUT
          fi

  build_and_upload_image:
    name: Publish image
    runs-on: ubuntu-latest
    needs:
      - branch_meta
    outputs:
      image_tag: ${{ steps.docker_meta_img_trivy.outputs.tags }}
    permissions:
      packages: write
      contents: write
      actions: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - id: repo-to-lowercase
        name: Convert repository to lowercase
        run: |
          repo_var=${{ github.repository }}
          echo "repository=${repo_var@L}" >> $GITHUB_OUTPUT

      - name: Build image name and tags
        id: docker_meta_img
        uses: docker/metadata-action@v5
        with:
          context: git
          images: |
            name=ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch,priority=601

      - id: extract-first-image-tag
        name: Extract first image tag
        run: |
          tags="${{ steps.docker_meta_img.outputs.tags }}"
          tag="${tags%%,*}"
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Log into ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the container image, scan it with ClamAV, and push it to ghcr, if it passed.
        id: docker_build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ steps.docker_meta_img.outputs.tags }}
          labels: ${{ steps.docker_meta_img.outputs.labels }}

      - name: Export Docker image as tar
        run: |
          mkdir -p ${{ github.workspace }}/clamavscan/container_fs
          chmod -R 777 ${{ github.workspace }}/clamavscan
          docker create --name temp_scan_container ${{ steps.first-image-tag.outputs.tag }}
          docker export temp_scan_container | tar -xf - -C ${{ github.workspace }}/clamavscan/container_fs
          docker rm temp_scan_container

      - name: Create ClamAV Socket dir
        run: |
          docker volume create sockets

      - name: create logfile
        run: |
          touch ${{ github.workspace }}/clamav-results.txt
          chmod ugo+rw ${{ github.workspace }}/clamav-results.txt

      - name: Run ClamAV Update
        run: |
          docker run --rm -v ${{ github.workspace }}/clamavscan:/scan clamav/clamav:latest freshclam --datadir=/scan

      - name: Run ClamAV start Daemon
        run: |
          docker run  --rm -v ${{ github.workspace }}/clamavscan:/scan -v sockets:/tmp clamav/clamav:latest &

      - name: Run ClamAV SCAN
        run: |
          docker run --rm -v ${{ github.workspace }}:/workdir -v ${{ github.workspace }}/clamavscan:/scan -v sockets:/tmp clamav/clamav:latest clamdscan /scan/container_fs -m -w --fdpass -l /workdir/clamav-results.txt -v --stdout

      - name: Upload ClamAV scan results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: clamav-results
          path: clamav-results.txt

      - name: Check ClamAV scan result
        run: |
          if grep -q "Infected files: 0" ${{ github.workspace }}/clamav-results.txt; then
            echo "No malware found."
          else
            echo "::warning::Malware detected or scan failed!"
            cat ${{ github.workspace }}/clamav-results.txt
            exit 1
          fi

      - name: Push scanned image to ghcr.io if it passed
        run: |
          echo "${{ steps.docker_meta_img.outputs.tags }}" | grep -v '^$' | while read TAG; do
            docker push "$TAG"
          done
        timeout-minutes: 10

      - name: run trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.first-image-tag.outputs.tag }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          scan-type: 'image'
        env:
          TRIVY_SKIP_DB_UPDATE: false
          TRIVY_SKIP_JAVA_DB_UPDATE: true

      - name: upload trivy results
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy vulnerability scanner to generate SBOM
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.first-image-tag.outputs.tag }}
          format: "github"
          output: "dependency-results.sbom.json"
          scan-type: 'image'
          github-pat: ${{ secrets.GITHUB_TOKEN }}
        env:
          TRIVY_SKIP_DB_UPDATE: false
          TRIVY_SKIP_JAVA_DB_UPDATE: false

      - name: Upload trivy report as a Github artifact
        uses: actions/upload-artifact@v4
        with:
          name: "trivy-sbom-report"
          path: '${{ github.workspace }}/dependency-results.sbom.json'
